name: Build Forge 1.12.2 Mod

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Java 8 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Gradle 4.10.3 indir
        run: |
          wget https://services.gradle.org/distributions/gradle-4.10.3-bin.zip
          unzip gradle-4.10.3-bin.zip

      - name: Build al
        run: |
          ./gradle-4.10.3/bin/gradle build --no-daemon --stacktrace

      - name: JAR dosyalarını yükle
        uses: actions/upload-artifact@v4
        with:
          name: built-mod-jars
          path: |
            **/build/libs/*.jar
          if-no-files-found: warn
